services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x_flask1
    depends_on:
      - mariadb
    ports:
      - 80:80
    volumes:
      - .:/app

  mariadb:
    image: mariadb:10.6.20
    container_name: x_mariadb1
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: x
    volumes:
      - mariadb_data1:/var/lib/mysql
    ports:
      - 3306:3306

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: x_phpmyadmin1
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 8080:80

volumes:
  mariadb_data1:
  arango_data1:

networks:
  arango-network1:
    driver: bridge
